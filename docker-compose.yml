services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cross_border_payments
      POSTGRES_USER: payments
      POSTGRES_PASSWORD: payments
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments -d cross_border_payments"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://payments:payments@postgres:5432/cross_border_payments
      REDIS_URL: redis://redis:6379/0
      WISE_API_KEY: stub-key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://payments:payments@postgres:5432/cross_border_payments
      REDIS_URL: redis://redis:6379/0
      WISE_API_KEY: stub-key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  beat:
    build: .
    command: celery -A workers.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://payments:payments@postgres:5432/cross_border_payments
      REDIS_URL: redis://redis:6379/0
      WISE_API_KEY: stub-key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
